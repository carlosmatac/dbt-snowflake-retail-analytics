version: 2

sources:
  - name: practice_source
    database: dbt_learning
    schema: dbt_cmata
    tables:
      - name: raw_orders_practice

snapshots:
  - name: snp_practice_orders
    relation: source('practice_source', 'raw_orders_practice')
    config:
      target_schema: snapshots # Esto creará el esquema DBT_CMATA_SNAPSHOTS
      unique_key: o_orderkey
      strategy: check
      # Vigilaremos si cambian el estado, la prioridad o el precio
      check_cols: ['o_orderstatus', 'o_shippriority', 'o_totalprice'] 
      invalidate_hard_deletes: true