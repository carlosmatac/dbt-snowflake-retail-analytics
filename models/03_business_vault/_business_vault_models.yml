version: 2

models:
  - name: pit_customer
    description: "Point-in-time (current) customer view — latest sat_customer per hub, enriched with nation/region via pit_location."
    columns:
      - name: customer_hk
        data_tests: [unique, not_null]
      - name: customer_id
        data_tests: [not_null]
      - name: customer_name
      - name: address
      - name: phone
      - name: account_balance
      - name: market_segment
      - name: nation_hk
      - name: nation_name
      - name: region_hk
      - name: region_name
      - name: load_datetime
        data_tests: [not_null]
      - name: record_source
        data_tests: [not_null]

  - name: pit_supplier
    description: "Point-in-time (current) supplier view — latest sat_supplier per hub, enriched via pit_location."
    columns:
      - name: supplier_hk
        data_tests: [unique, not_null]
      - name: supplier_id
        data_tests: [not_null]
      - name: supplier_name
      - name: address
      - name: phone
      - name: account_balance
      - name: nation_hk
      - name: nation_name
      - name: region_hk
      - name: region_name
      - name: load_datetime
        data_tests: [not_null]
      - name: record_source
        data_tests: [not_null]

  - name: pit_order
    description: "Point-in-time (current) order view — latest sat_order per hub."
    columns:
      - name: order_hk
        data_tests: [unique, not_null]
      - name: order_id
        data_tests: [not_null]
      - name: order_status
      - name: order_priority
      - name: clerk_name
      - name: order_date
        data_tests: [not_null]
      - name: load_datetime
        data_tests: [not_null]
      - name: record_source
        data_tests: [not_null]

  - name: pit_part
    description: "Point-in-time (current) part view — latest sat_part per hub."
    columns:
      - name: part_hk
        data_tests: [unique, not_null]
      - name: part_id
        data_tests: [not_null]
      - name: part_name
      - name: brand
      - name: part_type
      - name: part_size
      - name: container
      - name: retail_price
      - name: load_datetime
        data_tests: [not_null]
      - name: record_source
        data_tests: [not_null]

  - name: pit_nation
    description: "Point-in-time (current) nation view — latest sat_nation per hub plus region FK from link."
    columns:
      - name: nation_hk
        data_tests: [unique, not_null]
      - name: nation_id
        data_tests: [not_null]
      - name: nation_name
      - name: region_hk
      - name: load_datetime
        data_tests: [not_null]
      - name: record_source
        data_tests: [not_null]

  - name: pit_region
    description: "Point-in-time (current) region view — latest sat_region per hub."
    columns:
      - name: region_hk
        data_tests: [unique, not_null]
      - name: region_id
        data_tests: [not_null]
      - name: region_name
      - name: load_datetime
        data_tests: [not_null]
      - name: record_source
        data_tests: [not_null]

  - name: pit_location
    description: "Joined nation + region — single source for location attributes in BV/marts."
    columns:
      - name: nation_hk
        data_tests: [unique, not_null]
      - name: nation_id
        data_tests: [not_null]
      - name: nation_name
      - name: region_hk
        data_tests: [not_null]
      - name: region_id
        data_tests: [not_null]
      - name: region_name

  - name: pit_lineitem_sales
    description: "Point-in-time sales at lineitem grain; joins link_lineitem + latest sat_lineitem + pit_order for order_date + link_order_customer for customer_hk; exposes date surrogates."
    columns:
      - name: lineitem_hk
        data_tests: [unique, not_null]
      - name: order_hk
        data_tests: [not_null]
      - name: customer_hk
        data_tests: [not_null]
      - name: part_hk
        data_tests: [not_null]
      - name: supplier_hk
        data_tests: [not_null]
      - name: order_date
        data_tests: [not_null]
      - name: order_date_id
        data_tests: [not_null]
      - name: ship_date
      - name: ship_date_id
      - name: receipt_date
      - name: receipt_date_id
      - name: quantity
      - name: extended_price
      - name: discount_percentage
      - name: tax_percentage
      - name: item_total_price
      - name: net_revenue
      - name: load_datetime
        data_tests: [not_null]
      - name: record_source
        data_tests: [not_null]
