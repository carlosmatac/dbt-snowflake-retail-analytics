version: 2

models:
  - name: dim_customers
    description: "Dimensión de clientes cruzada con métricas agregadas de su historial de compras."
    config:
      group: core_sales
      access: protected
    columns:
      - name: customer_id
        description: "Clave primaria única de cada cliente."
        data_tests:
          - unique
          - not_null
          
      - name: customer_name
        description: "Nombre completo del cliente."

      - name: number_of_orders
        description: "Cantidad total de pedidos realizados por el cliente en toda su historia."
        
      - name: lifetime_value
        description: "Suma total del dinero gastado por el cliente. Si nunca ha comprado, es 0."