version: 2

models:
  - name: stg_tpch_customers
    description: "Tabla limpia de clientes"
    config:
      group: core_sales    # Asignamos el modelo a tu equipo
      access: private      # CANDADO PUESTO. Solo tu equipo puede usarlo.
    columns:
      - name: customer_id
        description: "Clave primaria del cliente"
        data_tests:
          - unique
          - not_null

  - name: stg_tpch_suppliers
    description: "Tabla limpia de proveedores"
    config:
      group: core_sales    # Asignamos el modelo a tu equipo
      access: private      # CANDADO PUESTO. Solo tu equipo puede usarlo.
    columns:
      - name: supplier_id
        description: "Clave primaria del proveedor"
        data_tests:
          - unique
          - not_null

  - name: stg_tpch_orders
    description: "Tabla limpia de pedidos"
    config:
      group: core_sales    # Asignamos el modelo a tu equipo
      access: private      # CANDADO PUESTO. Solo tu equipo puede usarlo.
    columns:
      - name: order_id
        description: "Clave primaria del pedido"
        data_tests:
          - unique:
              config:
                severity: error  # Por defecto es error, pero lo hacemos explícito
                warn_if: ">10"   # Si hay entre 11 y 100 duplicados, la terminal sale amarilla (Warning)
                error_if: ">100" # Si hay más de 100 duplicados, la terminal sale roja
          - not_null
      
      - name: customer_id
        description: "Clave foránea que enlaza con el cliente"
        data_tests:
          - not_null
          # TEST DE RELACIÓN: Comprueba que el cliente exista en la otra tabla
          - relationships:
              arguments:
                to: ref('stg_tpch_customers')
                field: customer_id
          

      - name: status
        description: "{{ doc('tpch_order_status') }}"
        data_tests:
          # TEST DE VALORES ACEPTADOS: TPCH usa O (Open), F (Finalized), P (Pending)
          - accepted_values:
              arguments:
                values: ['O', 'F', 'P']
                config:
                  limit: 10              # Si falla, que dbt solo procese los 10 primeros errores (ahorra dinero en Snowflake)
                  store_failures: true
      
      - name: total_price # <-- AÑADES LA COLUMNA CRUDA
        description: "Precio total del pedido."
        data_tests:
          - is_positive:    # <-- APLICAS TU TEST GENÉRICO AQUÍ
              config:
                # Solo queremos testear que el precio sea positivo si el pedido está Finalizado ('F')
                # Ignoramos los pedidos Pendientes porque a lo mejor aún no se ha calculado su precio.
                where: "status = 'F'"