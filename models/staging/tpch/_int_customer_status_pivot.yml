version: 2

models:
  - name: int_customer_status_pivot
    description: "Modelo intermedio. Pivota los estados de la tabla fct_orders a nivel de cliente usando Jinja."
    columns:
      - name: customer_id
        description: "Clave única del cliente."
        data_tests:
          - unique
          - not_null
          
      - name: amount_O
        description: "Importe total de todos los pedidos del cliente que están en estado Abierto (Open)."
        
      - name: amount_P
        description: "Importe total de todos los pedidos del cliente que están en estado Pendiente (Pending)."
        
      - name: amount_F
        description: "Importe total de todos los pedidos del cliente que están en estado Finalizado (Finalized)."