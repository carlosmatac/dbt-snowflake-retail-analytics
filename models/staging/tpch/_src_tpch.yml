version: 2

sources:
  - name: tpch_sample_data
    description: "Base de datos de prueba oficial de Snowflake (TPC-H). Contiene datos simulados de un ERP de ventas."
    database: SNOWFLAKE_SAMPLE_DATA
    schema: TPCH_SF1
    tables:
      - name: customer
        description: "Tabla cruda con la información maestra de los clientes."
        columns:
          - name: c_custkey
            description: "ID original del cliente en el ERP."
            data_tests:
              - unique
              - not_null

      - name: orders
        description: "Cabeceras de los pedidos realizados en el sistema."

      - name: supplier
        description: "Directorio de proveedores registrados en el sistema."