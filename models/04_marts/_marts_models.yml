version: 2

models:
  - name: dim_customers
    description: "Customer dimension (current state, flat Kimball — nation/region denormalized)."
    columns:
      - name: customer_hk
        description: "Surrogate key (hash) for customer."
        data_tests:
          - unique
          - not_null
          - relationships:
              to: ref('bv_customer_current')
              field: customer_hk
      - name: customer_id
        data_tests: [not_null]
      - name: customer_name
      - name: market_segment
      - name: nation_name
      - name: region_name

  - name: dim_supplier
    description: "Supplier dimension (current state, flat Kimball)."
    columns:
      - name: supplier_hk
        data_tests:
          - unique
          - not_null
          - relationships:
              to: ref('bv_supplier_current')
              field: supplier_hk
      - name: supplier_id
        data_tests: [not_null]
      - name: supplier_name
      - name: nation_name
      - name: region_name

  - name: dim_order
    description: "Order dimension (current state) with order_date and order_date_id for dim_date join."
    columns:
      - name: order_hk
        data_tests:
          - unique
          - not_null
          - relationships:
              to: ref('bv_order_current')
              field: order_hk
      - name: order_id
        data_tests: [not_null]
      - name: order_status
      - name: order_priority
      - name: clerk_name
      - name: order_date
      - name: order_date_id
        data_tests:
          - relationships:
              to: ref('dim_date')
              field: date_id

  - name: dim_part
    description: "Part dimension (current state). Columns size/type renamed to part_size/part_type to avoid BI-driver quoting issues."
    columns:
      - name: part_hk
        data_tests:
          - unique
          - not_null
          - relationships:
              to: ref('bv_part_current')
              field: part_hk
      - name: part_id
        data_tests: [not_null]
      - name: part_name
      - name: brand
      - name: part_type
      - name: part_size

  - name: dim_date
    description: "Standard Gregorian date dimension (1990-01-01 … 2030-12-31). Keyed by date_id (DATE)."
    columns:
      - name: date_id
        data_tests: [unique, not_null]
      - name: year
      - name: quarter
      - name: month
      - name: week
      - name: day
      - name: day_name
      - name: month_name
      - name: is_weekend

  - name: fct_sales
    description: "Sales fact at lineitem grain. Incremental on load_datetime with lineitem_hk unique key. Joins to dim_customers/dim_supplier/dim_order/dim_part/dim_date."
    columns:
      - name: lineitem_hk
        data_tests: [unique, not_null]
      - name: order_hk
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_order')
              field: order_hk
      - name: customer_hk
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_hk
      - name: part_hk
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_part')
              field: part_hk
      - name: supplier_hk
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_supplier')
              field: supplier_hk
      - name: order_date_id
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_id
      - name: ship_date_id
        data_tests:
          - relationships:
              to: ref('dim_date')
              field: date_id
      - name: receipt_date_id
        data_tests:
          - relationships:
              to: ref('dim_date')
              field: date_id
      - name: order_date
      - name: ship_date
      - name: receipt_date
      - name: quantity
      - name: extended_price
      - name: discount_percentage
      - name: tax_percentage
      - name: item_total_price
      - name: net_revenue
      - name: load_datetime
        data_tests: [not_null]
