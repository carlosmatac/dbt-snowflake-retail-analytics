version: 2

models:
  - name: hub_customer
    description: "Customer hub (TPCH customer)."
    columns:
      - name: CUSTOMER_HK
        description: "Hash key for customer hub."
        tests:
          - unique
          - not_null
      - name: C_CUSTKEY
        description: "Customer natural key from source."
        tests:
          - not_null

  - name: hub_order
    description: "Order hub (TPCH orders)."
    columns:
      - name: ORDER_HK
        description: "Hash key for order hub."
        tests:
          - unique
          - not_null
      - name: O_ORDERKEY
        description: "Order natural key from source."
        tests:
          - not_null

  - name: hub_part
    description: "Part hub (TPCH part)."
    columns:
      - name: PART_HK
        description: "Hash key for part hub."
        tests:
          - unique
          - not_null
      - name: P_PARTKEY
        description: "Part natural key from source."
        tests:
          - not_null

  - name: hub_supplier
    description: "Supplier hub (TPCH supplier)."
    columns:
      - name: SUPPLIER_HK
        description: "Hash key for supplier hub."
        tests:
          - unique
          - not_null
      - name: S_SUPPKEY
        description: "Supplier natural key from source."
        tests:
          - not_null

  - name: hub_nation
    description: "Hub for nation reference data"
    columns:
      - name: NATION_HK
        description: "Hash key for nation"
        tests:
          - unique
          - not_null
      - name: N_NATIONKEY
        description: "Natural key from source"
        tests:
          - not_null

  - name: hub_region
    description: "Hub for region reference data"
    columns:
      - name: REGION_HK
        description: "Hash key for region"
        tests:
          - unique
          - not_null
      - name: R_REGIONKEY
        description: "Natural key from source"
        tests:
          - not_null

  - name: link_lineitem
    description: "Link for lineitems, connecting order, part, and supplier."
    columns:
      - name: LINEITEM_HK
        description: "Hash key for lineitem link."
        tests:
          - unique
          - not_null
      - name: ORDER_HK
        description: "FK to order hub."
        tests:
          - not_null
      - name: PART_HK
        description: "FK to part hub."
        tests:
          - not_null
      - name: SUPPLIER_HK
        description: "FK to supplier hub."
        tests:
          - not_null

  - name: link_order_customer
    description: "Link between orders and customers"
    columns:
      - name: ORDER_CUSTOMER_HK
        description: "Hash key for the link"
        tests:
          - unique
          - not_null
      - name: ORDER_HK
        description: "FK to order hub"
        tests:
          - not_null
      - name: CUSTOMER_HK
        description: "FK to customer hub"
        tests:
          - not_null

  - name: link_part_supplier
    description: "Link between parts and suppliers (partsupp)."
    columns:
      - name: PART_SUPPLIER_HK
        description: "Hash key for part-supplier link."
        tests:
          - unique
          - not_null
      - name: PART_HK
        description: "FK to part hub."
        tests:
          - not_null
      - name: SUPPLIER_HK
        description: "FK to supplier hub."
        tests:
          - not_null

  - name: sat_customer
    description: "Customer satellite with descriptive attributes."
    columns:
      - name: CUSTOMER_HK
        description: "Hash key for customer."
        tests:
          - not_null
      - name: CUSTOMER_HASHDIFF
        description: "Hashdiff for customer payload."
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - CUSTOMER_HK
              - CUSTOMER_HASHDIFF
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - CUSTOMER_HK
              - LOAD_DATETIME

  - name: sat_order
    description: "Order satellite with descriptive attributes."
    columns:
      - name: ORDER_HK
        description: "Hash key for order."
        tests:
          - not_null
      - name: ORDER_HASHDIFF
        description: "Hashdiff for order payload."
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - ORDER_HK
              - ORDER_HASHDIFF
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - ORDER_HK
              - LOAD_DATETIME

  - name: sat_lineitem
    description: "Lineitem satellite with descriptive attributes."
    columns:
      - name: LINEITEM_HK
        description: "Hash key for lineitem."
        tests:
          - not_null
      - name: LINEITEM_HASHDIFF
        description: "Hashdiff for lineitem payload."
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - LINEITEM_HK
            - LINEITEM_HASHDIFF
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - LINEITEM_HK
              - LOAD_DATETIME

  - name: sat_part
    description: "Part satellite with descriptive attributes."
    columns:
      - name: PART_HK
        description: "Hash key for part."
        tests:
          - not_null
      - name: PART_HASHDIFF
        description: "Hashdiff for part payload."
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - PART_HK
              - PART_HASHDIFF
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - PART_HK
              - LOAD_DATETIME

  - name: sat_supplier
    description: "Supplier satellite with descriptive attributes."
    columns:
      - name: SUPPLIER_HK
        description: "Hash key for supplier."
        tests:
          - not_null
      - name: SUPPLIER_HASHDIFF
        description: "Hashdiff for supplier payload."
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - SUPPLIER_HK
              - SUPPLIER_HASHDIFF
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - SUPPLIER_HK
              - LOAD_DATETIME

  - name: sat_part_supplier
    description: "Satellite for part-supplier link attributes (partsupp)."
    columns:
      - name: PART_SUPPLIER_HK
        description: "Hash key for part-supplier link."
        tests:
          - not_null
      - name: PART_SUPPLIER_HASHDIFF
        description: "Hashdiff for part-supplier payload."
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - PART_SUPPLIER_HK
            - PART_SUPPLIER_HASHDIFF
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - PART_SUPPLIER_HK
              - LOAD_DATETIME

  - name: sat_order_customer
    description: "Satellite for order-customer link"
    columns:
      - name: ORDER_CUSTOMER_HASHDIFF
        description: "Hashdiff for payload"
        tests:
          - not_null
      - name: ORDER_CUSTOMER_HK
        description: "Hash key for link"
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - ORDER_CUSTOMER_HK
              - ORDER_CUSTOMER_HASHDIFF
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - ORDER_CUSTOMER_HK
              - LOAD_DATETIME

  - name: sat_nation
    description: "Satellite for nation attributes"
    columns:
      - name: NATION_HASHDIFF
        description: "Hashdiff for nation payload"
        tests:
          - not_null
      - name: NATION_HK
        description: "Hash key for nation"
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - NATION_HK
              - NATION_HASHDIFF
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - NATION_HK
              - LOAD_DATETIME

  - name: sat_region
    description: "Satellite for region attributes"
    columns:
      - name: REGION_HK
        description: "Hash key for region"
        tests:
          - not_null

      - name: REGION_HASHDIFF
        description: "Hashdiff for region payload."
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - REGION_HK
              - REGION_HASHDIFF
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - REGION_HK
              - LOAD_DATETIME
