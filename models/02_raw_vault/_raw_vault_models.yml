version: 2

models:
  # ============================================================
  # HUBS
  # ============================================================
  - name: hub_customer
    description: "Customer hub (TPCH customer)."
    columns:
      - name: CUSTOMER_HK
        description: "Hash key for customer hub."
        data_tests:
          - unique
          - not_null
      - name: C_CUSTKEY
        description: "Customer natural key from source."
        data_tests:
          - not_null
      - name: LOAD_DATETIME
        description: "Load timestamp."
        data_tests:
          - not_null
      - name: RECORD_SOURCE
        description: "Record source tag."
        data_tests:
          - not_null

  - name: hub_order
    description: "Order hub (TPCH orders)."
    columns:
      - name: ORDER_HK
        description: "Hash key for order hub."
        data_tests:
          - unique
          - not_null
      - name: O_ORDERKEY
        data_tests: [not_null]
      - name: LOAD_DATETIME
        data_tests: [not_null]
      - name: RECORD_SOURCE
        data_tests: [not_null]

  - name: hub_part
    description: "Part hub (TPCH part)."
    columns:
      - name: PART_HK
        data_tests: [unique, not_null]
      - name: P_PARTKEY
        data_tests: [not_null]
      - name: LOAD_DATETIME
        data_tests: [not_null]
      - name: RECORD_SOURCE
        data_tests: [not_null]

  - name: hub_supplier
    description: "Supplier hub (TPCH supplier)."
    columns:
      - name: SUPPLIER_HK
        data_tests: [unique, not_null]
      - name: S_SUPPKEY
        data_tests: [not_null]
      - name: LOAD_DATETIME
        data_tests: [not_null]
      - name: RECORD_SOURCE
        data_tests: [not_null]

  - name: hub_nation
    description: "Nation hub (reference data)."
    columns:
      - name: NATION_HK
        data_tests: [unique, not_null]
      - name: N_NATIONKEY
        data_tests: [not_null]
      - name: LOAD_DATETIME
        data_tests: [not_null]
      - name: RECORD_SOURCE
        data_tests: [not_null]

  - name: hub_region
    description: "Region hub (reference data)."
    columns:
      - name: REGION_HK
        data_tests: [unique, not_null]
      - name: R_REGIONKEY
        data_tests: [not_null]
      - name: LOAD_DATETIME
        data_tests: [not_null]
      - name: RECORD_SOURCE
        data_tests: [not_null]

  # ============================================================
  # LINKS
  # ============================================================
  - name: link_lineitem
    description: "Link lineitem ↔ order / part / supplier."
    columns:
      - name: LINEITEM_HK
        description: "Link primary hash key."
        data_tests: [unique, not_null]
      - name: ORDER_HK
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_order')
                field: ORDER_HK
      - name: PART_HK
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_part')
                field: PART_HK
      - name: SUPPLIER_HK
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_supplier')
                field: SUPPLIER_HK
      - name: LOAD_DATETIME
        data_tests: [not_null]
      - name: RECORD_SOURCE
        data_tests: [not_null]

  - name: link_order_customer
    description: "Link order ↔ customer."
    columns:
      - name: ORDER_CUSTOMER_HK
        data_tests: [unique, not_null]
      - name: ORDER_HK
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_order')
                field: ORDER_HK
      - name: CUSTOMER_HK
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_customer')
                field: CUSTOMER_HK
      - name: LOAD_DATETIME
        data_tests: [not_null]
      - name: RECORD_SOURCE
        data_tests: [not_null]

  - name: link_part_supplier
    description: "Link part ↔ supplier (partsupp)."
    columns:
      - name: PART_SUPPLIER_HK
        data_tests: [unique, not_null]
      - name: PART_HK
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_part')
                field: PART_HK
      - name: SUPPLIER_HK
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_supplier')
                field: SUPPLIER_HK
      - name: LOAD_DATETIME
        data_tests: [not_null]
      - name: RECORD_SOURCE
        data_tests: [not_null]

  - name: link_customer_nation
    description: "Link customer ↔ nation (C_NATIONKEY)."
    columns:
      - name: CUSTOMER_NATION_HK
        data_tests: [unique, not_null]
      - name: CUSTOMER_HK
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_customer')
                field: CUSTOMER_HK
      - name: NATION_HK
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_nation')
                field: NATION_HK
      - name: LOAD_DATETIME
        data_tests: [not_null]
      - name: RECORD_SOURCE
        data_tests: [not_null]

  - name: link_supplier_nation
    description: "Link supplier ↔ nation (S_NATIONKEY)."
    columns:
      - name: SUPPLIER_NATION_HK
        data_tests: [unique, not_null]
      - name: SUPPLIER_HK
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_supplier')
                field: SUPPLIER_HK
      - name: NATION_HK
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_nation')
                field: NATION_HK
      - name: LOAD_DATETIME
        data_tests: [not_null]
      - name: RECORD_SOURCE
        data_tests: [not_null]

  - name: link_nation_region
    description: "Link nation ↔ region (N_REGIONKEY)."
    columns:
      - name: NATION_REGION_HK
        data_tests: [unique, not_null]
      - name: NATION_HK
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_nation')
                field: NATION_HK
      - name: REGION_HK
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_region')
                field: REGION_HK
      - name: LOAD_DATETIME
        data_tests: [not_null]
      - name: RECORD_SOURCE
        data_tests: [not_null]

  # ============================================================
  # SATELLITES
  # ============================================================
  - name: sat_customer
    description: "Customer satellite — descriptive attributes (no FK leakage)."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [CUSTOMER_HK, CUSTOMER_HASHDIFF]
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [CUSTOMER_HK, LOAD_DATETIME]
    columns:
      - name: CUSTOMER_HK
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_customer')
                field: CUSTOMER_HK
      - name: CUSTOMER_HASHDIFF
        data_tests: [not_null]
      - name: LOAD_DATETIME
        data_tests: [not_null]
      - name: RECORD_SOURCE
        data_tests: [not_null]

  - name: sat_order
    description: "Order satellite — descriptive attributes."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [ORDER_HK, ORDER_HASHDIFF]
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [ORDER_HK, LOAD_DATETIME]
    columns:
      - name: ORDER_HK
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_order')
                field: ORDER_HK
      - name: ORDER_HASHDIFF
        data_tests: [not_null]
      - name: LOAD_DATETIME
        data_tests: [not_null]
      - name: RECORD_SOURCE
        data_tests: [not_null]

  - name: sat_lineitem
    description: "Lineitem satellite — descriptive/measure attributes on the link grain."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [LINEITEM_HK, LINEITEM_HASHDIFF]
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [LINEITEM_HK, LOAD_DATETIME]
    columns:
      - name: LINEITEM_HK
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('link_lineitem')
                field: LINEITEM_HK
      - name: LINEITEM_HASHDIFF
        data_tests: [not_null]
      - name: LOAD_DATETIME
        data_tests: [not_null]
      - name: RECORD_SOURCE
        data_tests: [not_null]

  - name: sat_part
    description: "Part satellite — descriptive attributes."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [PART_HK, PART_HASHDIFF]
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [PART_HK, LOAD_DATETIME]
    columns:
      - name: PART_HK
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_part')
                field: PART_HK
      - name: PART_HASHDIFF
        data_tests: [not_null]
      - name: LOAD_DATETIME
        data_tests: [not_null]
      - name: RECORD_SOURCE
        data_tests: [not_null]

  - name: sat_supplier
    description: "Supplier satellite — descriptive attributes."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [SUPPLIER_HK, SUPPLIER_HASHDIFF]
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [SUPPLIER_HK, LOAD_DATETIME]
    columns:
      - name: SUPPLIER_HK
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_supplier')
                field: SUPPLIER_HK
      - name: SUPPLIER_HASHDIFF
        data_tests: [not_null]
      - name: LOAD_DATETIME
        data_tests: [not_null]
      - name: RECORD_SOURCE
        data_tests: [not_null]

  - name: sat_part_supplier
    description: "Part-supplier link satellite (stock attributes)."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [PART_SUPPLIER_HK, PART_SUPPLIER_HASHDIFF]
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [PART_SUPPLIER_HK, LOAD_DATETIME]
    columns:
      - name: PART_SUPPLIER_HK
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('link_part_supplier')
                field: PART_SUPPLIER_HK
      - name: PART_SUPPLIER_HASHDIFF
        data_tests: [not_null]
      - name: LOAD_DATETIME
        data_tests: [not_null]
      - name: RECORD_SOURCE
        data_tests: [not_null]

  - name: sat_nation
    description: "Nation satellite — descriptive attributes (FK to region now lives only in link_nation_region)."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [NATION_HK, NATION_HASHDIFF]
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [NATION_HK, LOAD_DATETIME]
    columns:
      - name: NATION_HK
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_nation')
                field: NATION_HK
      - name: NATION_HASHDIFF
        data_tests: [not_null]
      - name: LOAD_DATETIME
        data_tests: [not_null]
      - name: RECORD_SOURCE
        data_tests: [not_null]

  - name: sat_region
    description: "Region satellite — descriptive attributes."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [REGION_HK, REGION_HASHDIFF]
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [REGION_HK, LOAD_DATETIME]
    columns:
      - name: REGION_HK
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hub_region')
                field: REGION_HK
      - name: REGION_HASHDIFF
        data_tests: [not_null]
      - name: LOAD_DATETIME
        data_tests: [not_null]
      - name: RECORD_SOURCE
        data_tests: [not_null]
